# To use a locally built image instead of the registry image, either:
#   export CONSTEIG_IMAGE=consteig_dev_image:${CONTAINER_TAG}
# or add to a .env file in the project root:
#   CONSTEIG_IMAGE=consteig_dev_image:${CONTAINER_TAG}
# CONTAINER_TAG is defined in .env at the project root.
services:
    dev_env:
        image: ${CONSTEIG_IMAGE:-ghcr.io/mitchellthompkins/consteig_dev_image:${CONTAINER_TAG}}
        environment:
            - USER=${USER}
            - MY_UID=${MY_UID:? Error -> need UID.}
            - MY_GID=${MY_GID:? Error -> need GID.}
        volumes:
            - "${PWD}:${PWD}"
            - "${PWD}/.ash_history:/home/${USER}/.ash_history"
        network_mode: host
        tty: True
        working_dir: ${PWD}
        entrypoint: ${PWD}/entrypoint.sh
        command: /bin/sh
