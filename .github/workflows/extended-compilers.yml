name: Extended Compiler Tests

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  # ---------------------------------------------------------------------------
  # Multi-platform native builds (build + test)
  # ---------------------------------------------------------------------------
  multi_platform:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-gcc
            os: ubuntu-latest
            cc: gcc
            cxx: g++
          - name: ubuntu-clang
            os: ubuntu-latest
            cc: clang
            cxx: clang++
          - name: macos-appleclang
            os: macos-latest
            cc: clang
            cxx: clang++
          - name: macos-gcc
            os: macos-latest
            cc: gcc-14
            cxx: g++-14
    name: native / ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (macOS GCC)
        if: matrix.name == 'macos-gcc'
        run: brew install gcc@14

      - name: Build
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -B build \
            -DCONSTEIG_RAISE_COMPILER_LIMITS=ON
          cmake --build build -j $(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Test
        run: ctest --test-dir build -j $(nproc 2>/dev/null || sysctl -n hw.ncpu) --output-on-failure
