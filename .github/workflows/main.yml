name: docker_image_ci

on:
  push:
  pull_request:
    branches:
        - develop

jobs:
    build_and_publish_container:
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
        permissions:
          packages: write
          contents: read
        steps:
            - uses: actions/checkout@v2
            - name: Login to GitHub Container Registry
              uses: docker/login-action@v1
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Build and publish docker image
              run: |
                    docker build . --file Dockerfile --tag ghcr.io/mitchellthompkins/consteig_dev_image:latest
                    # docker run is unnecessary for just building/pushing
                    docker push ghcr.io/mitchellthompkins/consteig_dev_image:latest

    build_and_test:
        needs: build_and_publish_container
        if: always() && (needs.build_and_publish_container.result == 'success' || needs.build_and_publish_container.result == 'skipped')
        runs-on: ubuntu-latest
        permissions:
          packages: read
          contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v2
            
            - name: Login to GitHub Container Registry
              uses: docker/login-action@v1
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Lint
              run: |
                    export MY_UID=$(id -u)
                    export MY_GID=$(id -g)
                    # Ensure we pull the latest image
                    docker pull ghcr.io/mitchellthompkins/consteig_dev_image:latest
                    make container.make.check-format

            - name: gcc
              run: |
                    export MY_UID=$(id -u)
                    export MY_GID=$(id -g)
                    git submodule update --init --recursive
                    # Ensure we pull the latest image
                    docker pull ghcr.io/mitchellthompkins/consteig_dev_image:latest
                    if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/develop" ]]; then
                        export BUILD_SLOW_TESTS=1
                    else
                        export BUILD_SLOW_TESTS=1
                    fi
                    make remove
                    export CONSTEIG_ENABLE_ROBUSTNESS=1
                    make CC=gcc CXX=g++ container.make.build
                    make container.make.test

            - name: clang
              run: |
                    export MY_UID=$(id -u)
                    export MY_GID=$(id -g)
                    git submodule update --init --recursive
                    # Ensure we pull the latest image
                    docker pull ghcr.io/mitchellthompkins/consteig_dev_image:latest
                    if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/develop" ]]; then
                        export BUILD_SLOW_TESTS=1
                    else
                        export BUILD_SLOW_TESTS=0
                    fi
                    make remove
                    export CONSTEIG_ENABLE_ROBUSTNESS=1
                    make CC=clang CXX=clang++ container.make.build
                    make container.make.test
