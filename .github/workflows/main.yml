name: build-and-test

on:
  push:
    branches: [main]
  pull_request:
    branches:
        - main
  schedule:
      - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
    build-and-publish-container:
        runs-on: ubuntu-latest
        outputs:
          image_tag: ${{ steps.set-tag.outputs.image_tag }}
        permissions:
          packages: write
          contents: read
        steps:
            - uses: actions/checkout@v6

            - name: Load container tag from .env
              run: grep ^CONTAINER_TAG .env >> $GITHUB_ENV

            - name: Detect Dockerfile and .env changes
              id: detect-changes
              run: |
                    if [ "${{ github.event_name }}" = "pull_request" ]; then
                      git fetch --unshallow origin
                      git fetch origin ${{ github.event.pull_request.base.ref }}
                      CHANGED_FILES=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD)
                    elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                      git fetch --unshallow origin main || true
                      CHANGED_FILES=$(git diff --name-only origin/main...HEAD 2>/dev/null || echo "")
                    else
                      CHANGED_FILES=""
                    fi
                    echo "dockerfile_changed=$(echo "$CHANGED_FILES" | grep -q '^Dockerfile$' && echo true || echo false)" >> "$GITHUB_OUTPUT"
                    echo "env_changed=$(echo "$CHANGED_FILES" | grep -q '^\.env$' && echo true || echo false)" >> "$GITHUB_OUTPUT"

            - name: Require Dockerfile and .env to change together
              if: steps.detect-changes.outputs.dockerfile_changed != steps.detect-changes.outputs.env_changed
              run: |
                    if [ "${{ steps.detect-changes.outputs.dockerfile_changed }}" = "true" ]; then
                      echo "ERROR: Dockerfile changed but .env was not updated (CONTAINER_TAG must be bumped)"
                    else
                      echo "ERROR: .env changed but Dockerfile was not updated (CONTAINER_TAG should only change with Dockerfile)"
                    fi
                    exit 1

            - name: Set image tag
              id: set-tag
              run: |
                    if [ "${{ steps.detect-changes.outputs.dockerfile_changed }}" = "true" ]; then
                      echo "image_tag=sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"
                    else
                      echo "image_tag=${{ env.CONTAINER_TAG }}" >> "$GITHUB_OUTPUT"
                    fi

            - name: Login to GitHub Container Registry
              if: (github.ref == 'refs/heads/main' || steps.detect-changes.outputs.dockerfile_changed == 'true') && github.event_name != 'schedule'
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and publish docker image
              if: (github.ref == 'refs/heads/main' || steps.detect-changes.outputs.dockerfile_changed == 'true') && github.event_name != 'schedule'
              run: |
                    docker build . --file Dockerfile --tag ghcr.io/mitchellthompkins/consteig_dev_image:sha-${{ github.sha }}
                    docker push ghcr.io/mitchellthompkins/consteig_dev_image:sha-${{ github.sha }}

            - name: Tag and push date tag
              if: github.ref == 'refs/heads/main' && github.event_name != 'schedule'
              run: |
                    docker tag ghcr.io/mitchellthompkins/consteig_dev_image:sha-${{ github.sha }} ghcr.io/mitchellthompkins/consteig_dev_image:${{ env.CONTAINER_TAG }}
                    docker push ghcr.io/mitchellthompkins/consteig_dev_image:${{ env.CONTAINER_TAG }}

    lint:
        needs: build-and-publish-container
        if: needs.build-and-publish-container.result == 'success'
        runs-on: ubuntu-latest
        container:
          image: ghcr.io/mitchellthompkins/consteig_dev_image:${{ needs.build-and-publish-container.outputs.image_tag }}
        permissions:
          contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Check formatting
              run: make check-format

    build-and-test:
        name: ${{ matrix.compiler }}-${{ matrix.mode }}${{ matrix.math != 'builtin' && format('-{0}', matrix.math) || '' }}
        needs: build-and-publish-container
        if: needs.build-and-publish-container.result == 'success'
        runs-on: ubuntu-latest
        container:
          image: ghcr.io/mitchellthompkins/consteig_dev_image:${{ needs.build-and-publish-container.outputs.image_tag }}
        permissions:
          contents: read
        strategy:
          matrix:
            compiler: [gcc, clang]
            mode: [test, examples]
            math: [builtin, gcem, gcem-stdlib]
            exclude:
              # Examples are tested with builtin only — gcem variants exercise
              # the same code paths and would only add CI cost without coverage.
              - mode: examples
                math: gcem
              - mode: examples
                math: gcem-stdlib
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                submodules: recursive

            - name: Build and test (builtin)
              if: matrix.mode == 'test' && matrix.math == 'builtin'
              run: make test.${{ matrix.compiler }}

            - name: Build and test (gcem)
              if: matrix.mode == 'test' && matrix.math == 'gcem'
              run: make test.${{ matrix.compiler }}.gcem

            - name: Build and test (gcem-stdlib)
              if: matrix.mode == 'test' && matrix.math == 'gcem-stdlib'
              run: make test.${{ matrix.compiler }}.gcem-stdlib

            - name: Build and run examples
              if: matrix.mode == 'examples'
              run: make examples.${{ matrix.compiler }}

    cross-compile:
        name: cross-${{ matrix.target }}${{ matrix.math != 'builtin' && format('-{0}', matrix.math) || '' }}
        needs: build-and-publish-container
        if: needs.build-and-publish-container.result == 'success'
        runs-on: ubuntu-latest
        container:
          image: ghcr.io/mitchellthompkins/consteig_dev_image:${{ needs.build-and-publish-container.outputs.image_tag }}
        permissions:
          contents: read
        strategy:
          matrix:
            target: [arm-gcc, arm-clang]
            math: [builtin, gcem]
            # gcem-stdlib is excluded for cross-compilation: stdlib is not
            # available in the bare-metal ARM freestanding environment.
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                submodules: recursive

            - name: Cross-compile builtin (static_assert is the test)
              if: matrix.math == 'builtin'
              run: make cross.${{ matrix.target }}

            - name: Cross-compile gcem (static_assert is the test)
              if: matrix.math == 'gcem'
              run: make cross.${{ matrix.target }}.gcem

    dc-motor-fail:
        needs: build-and-publish-container
        if: needs.build-and-publish-container.result == 'success'
        runs-on: ubuntu-latest
        container:
          image: ghcr.io/mitchellthompkins/consteig_dev_image:${{ needs.build-and-publish-container.outputs.image_tag }}
        permissions:
          contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                submodules: recursive

            - name: Verify dc_motor_control build fails
              run: make test-dc-motor-fail
