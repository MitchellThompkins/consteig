name: docker_image_ci

on:
  push:
  pull_request:
    branches:
        - develop

jobs:
    build_and_publish_container:
        runs-on: ubuntu-latest
        permissions:
          packages: write
          contents: read
        steps:
            - uses: actions/checkout@v2
            - name: Login to GitHub Container Registry
              uses: docker/login-action@v1
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Build and publish docker image
              run: |
                    docker build . --file Dockerfile --tag ghcr.io/mitchellthompkins/consteig_dev_image:latest
                    # docker run is unnecessary for just building/pushing
                    docker push ghcr.io/mitchellthompkins/consteig_dev_image:latest

    build_and_test:
        needs: build_and_publish_container
        runs-on: ubuntu-latest
        permissions:
          packages: read
          contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v2
            
            - name: Login to GitHub Container Registry
              uses: docker/login-action@v1
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build tests
              run: |
                    export MY_UID=$(id -u)
                    export MY_GID=$(id -g)
                    git submodule update --init --recursive
                    # Ensure we pull the latest image we just built
                    docker pull ghcr.io/mitchellthompkins/consteig_dev_image:latest
                    export BUILD_SLOW_TESTS=1
                    make container.make.build
                    make container.make.test
