name: docker_image_ci

on:
  push:
  pull_request:
    branches:
        - develop

jobs:
    build_and_publish_container:
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
        permissions:
          packages: write
          contents: read
        steps:
            - uses: actions/checkout@v6
            - name: Login to GitHub Container Registry
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Build and publish docker image
              run: |
                    docker build . --file Dockerfile --tag ghcr.io/mitchellthompkins/consteig_dev_image:latest
                    docker push ghcr.io/mitchellthompkins/consteig_dev_image:latest

    lint:
        needs: build_and_publish_container
        if: always() && (needs.build_and_publish_container.result == 'success' || needs.build_and_publish_container.result == 'skipped')
        runs-on: ubuntu-latest
        permissions:
          packages: read
          contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Check formatting
              run: |
                    export MY_UID=$(id -u)
                    export MY_GID=$(id -g)
                    docker pull ghcr.io/mitchellthompkins/consteig_dev_image:latest
                    make container.make.check-format

    build-and-test:
        name: ${{ matrix.compiler }}-${{ matrix.mode }}
        needs: build_and_publish_container
        if: always() && (needs.build_and_publish_container.result == 'success' || needs.build_and_publish_container.result == 'skipped')
        runs-on: ubuntu-latest
        permissions:
          packages: read
          contents: read
        strategy:
          matrix:
            compiler: [gcc, clang]
            mode: [test, examples]
            include:
              - compiler: gcc
                cc: gcc
                cxx: g++
              - compiler: clang
                cc: clang
                cxx: clang++
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and test
              if: matrix.mode == 'test'
              run: |
                    export MY_UID=$(id -u)
                    export MY_GID=$(id -g)
                    git submodule update --init --recursive
                    docker pull ghcr.io/mitchellthompkins/consteig_dev_image:latest
                    make CC=${{ matrix.cc }} CXX=${{ matrix.cxx }} container.make.build
                    make container.make.test

            - name: Build and run examples
              if: matrix.mode == 'examples'
              run: |
                    export MY_UID=$(id -u)
                    export MY_GID=$(id -g)
                    git submodule update --init --recursive
                    docker pull ghcr.io/mitchellthompkins/consteig_dev_image:latest
                    make CC=${{ matrix.cc }} CXX=${{ matrix.cxx }} container.make.run-examples

    dc-motor-fail:
        needs: build_and_publish_container
        if: always() && (needs.build_and_publish_container.result == 'success' || needs.build_and_publish_container.result == 'skipped')
        runs-on: ubuntu-latest
        permissions:
          packages: read
          contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Verify dc_motor_control build fails
              run: |
                    export MY_UID=$(id -u)
                    export MY_GID=$(id -g)
                    git submodule update --init --recursive
                    docker pull ghcr.io/mitchellthompkins/consteig_dev_image:latest
                    make container.make.test-dc-motor-fail
