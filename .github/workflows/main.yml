name: docker_image_ci

on:
  push:
    branches: [develop, main]
  pull_request:
    branches:
        - develop

jobs:
    build-and-publish-container:
        runs-on: ubuntu-latest
        outputs:
          image_tag: ${{ steps.set-tag.outputs.image_tag }}
        permissions:
          packages: write
          contents: read
        steps:
            - uses: actions/checkout@v6

            - name: Load container tag from .env
              run: grep ^CONTAINER_TAG .env >> $GITHUB_ENV

            - name: Detect Dockerfile changes
              id: dockerfile-changed
              run: |
                    if [ "${{ github.event_name }}" = "pull_request" ]; then
                      git fetch origin ${{ github.event.pull_request.base.sha }} --depth=1
                      BASE="${{ github.event.pull_request.base.sha }}"
                      if git diff --name-only "$BASE" HEAD | grep -q '^Dockerfile$'; then
                        echo "changed=true" >> "$GITHUB_OUTPUT"
                      else
                        echo "changed=false" >> "$GITHUB_OUTPUT"
                      fi
                    else
                      echo "changed=false" >> "$GITHUB_OUTPUT"
                    fi

            - name: Require tag bump when Dockerfile changes
              if: steps.dockerfile-changed.outputs.changed == 'true'
              run: |
                    BASE="${{ github.event.pull_request.base.sha }}"
                    if ! git diff --name-only "$BASE" HEAD | grep -q '^\.env$'; then
                      echo "ERROR: Dockerfile changed but .env was not updated (CONTAINER_TAG must be bumped)"
                      exit 1
                    fi

            - name: Set image tag
              id: set-tag
              run: |
                    if [ "${{ steps.dockerfile-changed.outputs.changed }}" = "true" ]; then
                      echo "image_tag=sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"
                    else
                      echo "image_tag=${{ env.CONTAINER_TAG }}" >> "$GITHUB_OUTPUT"
                    fi

            - name: Login to GitHub Container Registry
              if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' || steps.dockerfile-changed.outputs.changed == 'true'
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and publish docker image
              if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' || steps.dockerfile-changed.outputs.changed == 'true'
              run: |
                    docker build . --file Dockerfile --tag ghcr.io/mitchellthompkins/consteig_dev_image:sha-${{ github.sha }}
                    docker push ghcr.io/mitchellthompkins/consteig_dev_image:sha-${{ github.sha }}

            - name: Tag and push date tag
              if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
              run: |
                    docker tag ghcr.io/mitchellthompkins/consteig_dev_image:sha-${{ github.sha }} ghcr.io/mitchellthompkins/consteig_dev_image:${{ env.CONTAINER_TAG }}
                    docker push ghcr.io/mitchellthompkins/consteig_dev_image:${{ env.CONTAINER_TAG }}

    lint:
        needs: build-and-publish-container
        if: needs.build-and-publish-container.result == 'success'
        runs-on: ubuntu-latest
        container:
          image: ghcr.io/mitchellthompkins/consteig_dev_image:${{ needs.build-and-publish-container.outputs.image_tag }}
          credentials:
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}
        permissions:
          packages: read
          contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Check formatting
              run: make check-format

    build-and-test:
        name: ${{ matrix.compiler }}-${{ matrix.mode }}
        needs: build-and-publish-container
        if: needs.build-and-publish-container.result == 'success'
        runs-on: ubuntu-latest
        container:
          image: ghcr.io/mitchellthompkins/consteig_dev_image:${{ needs.build-and-publish-container.outputs.image_tag }}
          credentials:
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}
        permissions:
          packages: read
          contents: read
        strategy:
          matrix:
            compiler: [gcc, clang]
            mode: [test, examples]
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                submodules: recursive

            - name: Build and test
              if: matrix.mode == 'test'
              run: make test.${{ matrix.compiler }}

            - name: Build and run examples
              if: matrix.mode == 'examples'
              run: make examples.${{ matrix.compiler }}

    cross-compile:
        name: cross-${{ matrix.target }}
        needs: build-and-publish-container
        if: needs.build-and-publish-container.result == 'success'
        runs-on: ubuntu-latest
        container:
          image: ghcr.io/mitchellthompkins/consteig_dev_image:${{ needs.build-and-publish-container.outputs.image_tag }}
          credentials:
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}
        permissions:
          packages: read
          contents: read
        strategy:
          matrix:
            target: [arm-gcc, arm-clang]
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                submodules: recursive

            - name: Cross-compile (static_assert is the test)
              run: make cross.${{ matrix.target }}

    dc-motor-fail:
        needs: build-and-publish-container
        if: needs.build-and-publish-container.result == 'success'
        runs-on: ubuntu-latest
        container:
          image: ghcr.io/mitchellthompkins/consteig_dev_image:${{ needs.build-and-publish-container.outputs.image_tag }}
          credentials:
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}
        permissions:
          packages: read
          contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                submodules: recursive

            - name: Verify dc_motor_control build fails
              run: make test-dc-motor-fail
